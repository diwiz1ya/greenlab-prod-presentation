<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f5"/>
      <stop offset="100%" stop-color="#f9ece8"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bgc)"/>
  <rect x="0" y="0" width="1440" height="76" fill="#7a2f1f"/>
  <text x="36" y="48" fill="#ffffff" font-size="26" font-family="Segoe UI, Arial">Доступ ограничен</text>

  <rect x="370" y="180" width="700" height="540" rx="16" fill="#ffffff" stroke="#efd1ca"/>
  <text x="430" y="270" fill="#7a2f1f" font-size="42" font-weight="700" font-family="Segoe UI, Arial">Нет доступа к станции</text>
  <text x="430" y="322" fill="#6e4a42" font-size="20" font-family="Segoe UI, Arial">Ваша роль не позволяет открыть этот раздел.</text>
  <text x="430" y="360" fill="#6e4a42" font-size="20" font-family="Segoe UI, Arial">Обратитесь к администратору или выберите доступную станцию.</text>

  <rect x="430" y="420" width="260" height="64" rx="10" fill="#7a2f1f"/>
  <text x="496" y="460" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial">К выбору</text>

  <rect x="710" y="420" width="260" height="64" rx="10" fill="#f3e8e5" stroke="#efd1ca"/>
  <text x="792" y="460" fill="#7a2f1f" font-size="24" font-family="Segoe UI, Arial">Выход</text>

  <rect x="430" y="512" width="540" height="150" rx="12" fill="#fff5f2" stroke="#efd1ca"/>
  <text x="456" y="556" fill="#7a2f1f" font-size="18" font-weight="700" font-family="Segoe UI, Arial">Пример правила:</text>
  <text x="456" y="588" fill="#6e4a42" font-size="17" font-family="Segoe UI, Arial">Роль "Sorting" может открыть только экран сортировки.</text>
  <text x="456" y="616" fill="#6e4a42" font-size="17" font-family="Segoe UI, Arial">Попытка открыть Pickup блокируется этим экраном.</text>
</svg>
